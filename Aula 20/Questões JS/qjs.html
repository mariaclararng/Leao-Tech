<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade: Questões de JS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

   <style>
        .caixa-cadastro {
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 2rem;
            background-color: #ddd8d8;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            margin-bottom: 2rem;
        }
    </style>

<body>

    <div class="caixa-cadastro">

        <h3 class="text-center">Cadastro de Usuários - PF</h3>
    <div class="p-5">
        <input type="text" id="nome" class="form-control mb-2" placeholder="Nome">
        <input type="number" id="idade" class="form-control mb-2" placeholder="Idade">
        <input type="text" id="cpf" class="form-control mb-2" placeholder="CPF">
        <input type="text" id="foto" class="form-control mb-2" placeholder="URL da Foto">
    </div>


<div class="ms-5 ps-5">
        <button onclick="cadastrar()" class="btn btn-primary col-1 offset-3 mt-4">Cadastrar</button>
        <button onclick="listar()" class="btn btn-success col-1 offset-1 mt-4">Listar</button>
        <button onclick="editar()" class="btn btn-warning col-1 offset-1 mt-4">Editar (pelo CPF)</button>
</div>

        <hr>
        <div id="listaCards" class="row"></div>
    </div>

<script>


// Usuários teste de (pré-cadastrados)
let usuarios = [
    { nome: "MC", idade: 24, foto: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_dPQc-7Cnwhe2OnBHt-ywQuveOt0fwmEvgw&s", cpf: "xxx.xxx.xxx-xx" },
    { nome: "Ana", idade: 20, foto: "https://img.freepik.com/fotos-gratis/delicioso-prato-tradicional-portugues-empadao_23-2149862968.jpg", cpf: "xxx.xxx.xxx-xx" },
    { nome: "Lia", idade: 30, foto: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRqjNBB6vTwVcnFTXIufnqzn4MncnCB0DhxUQ&s", cpf: "xxx.xxx.xxx-xx" }
];

// PARTE 01: CADASTRAR
function cadastrar() {
    const novo = {
        nome: document.getElementById('nome').value,
        idade: document.getElementById('idade').value,
        foto: document.getElementById('foto').value,
        cpf: document.getElementById('cpf').value
    };
    usuarios.push(novo); 
    document.getElementById('nome').value ="",
    document.getElementById('idade').value ="",
    document.getElementById('foto').value = "",
    document.getElementById('cpf').value = "",// campo de direticonar para o fim de fila
    alert("Usuário cadastrado com sucesso!");
}

// PARTE 02: LISTAR 
function listar() {
    const areaCards = document.getElementById('listaCards');
    areaCards.innerHTML = "";
    usuarios.forEach(user => {
        areaCards.innerHTML += `
            <div class="col-md-4 mb-3">
                <div class="card">
                    <img src="${user.foto}" class="card-img-top" alt="foto">
                    <div class="card-body">
                        <h5 class="card-title">${user.nome}</h5>
                        <p class="card-text">Idade: ${user.idade} | CPF: ${user.cpf}</p>
                    </div>
                </div>
            </div>
        `;
    });
}

// PARTE 03: EDITAR 
function editar() {
    const cpfDigitado = document.getElementById('cpf').value;
    const achado = usuarios.find(user => user.cpf === cpfDigitado);

    if (achado) {
        document.getElementById('nome').value = achado.nome;
        document.getElementById('idade').value = achado.idade;
        document.getElementById('foto').value = achado.foto;
        alert("Usuário encontrado! Agora você pode alterar os dados e clicar em cadastrar.)");
    } else {
        alert("CPF não encontrado, por favor tente novamente.");
    }
}

</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


</body>

</html>
