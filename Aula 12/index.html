    <script> 

    /* EXERCICIO 02:
        2. Peça para o usuário digitar 3 notas, calcule a média das notas e mostre na tela.
        */
        let nota01 = parseFloat(prompt('Digite o valor 01'));
        let nota02 = parseFloat(prompt('Digite o valor 02'));
        let nota03 = parseFloat(prompt('Digite o valor 03'));

        // calculo de notas - resultado
        let media = (+nota01 + +nota02 + +nota03) / 3;
        alert("Seu valor é de:" + media.toFixed());

        if(media < 4){
            console.log('Reprovado');
        } else if(media < 7){
            console.log('Recuperação');
        } else{
            console.log('Aprovado');
        }

        

    </script>
